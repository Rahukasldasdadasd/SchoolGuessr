<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SchoolGuessr POC</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <h1>S c h o o l G u e s s r POC</h1>

    <div class="game-container">

        <h2 id="roundTitle">Where is this classroom?</h2>

        <p id="roundCounter">Round 1 / 5</p>

        <img id="roomImage"
             src="testimgclassroom.jpg"
             alt="Mystery Classroom" />

        <div id="mapContainer">

            <img id="schoolMap"
                 src="testmapimg.jpg"
                 alt="School Map" />

            <div id="marker"></div>

            <div id="coordinates">
                X: -- Y: --
            </div>

            <!-- SVG overlay for drawing lines -->
            <svg id="lineOverlay"
                 style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10;">
            </svg>

            <!-- Flag icon -->
            <div id="flag">
                <img src="flagpng.png"
                     style="width:100%; height:100%; object-fit:contain;"
                     alt="Flag"/>
            </div>

        </div>

        <button id="submitGuess">
            Submit Guess
        </button>

        <button id="nextRoundBtn">
            Next Round
        </button>

        <button id="restartBtn">
            Restart Game
        </button>

        <p id="result"></p>

    </div>

    <script src="script.js"></script>

</body>

</html>
